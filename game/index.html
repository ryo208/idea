  :root{
    color-scheme:dark;
    --bg:#0D1A12; --panel:#14241A; --panel2:#0F1E15; --line:#25392C;
    --gold:#E8C158; --goldb:#F7DE8B; --golddim:#8f7a3f;
    --ink:#F2EAD3; --sec:#B8C4B4; --mut:#71836F;
    --hanko:#C43D2E;
    --min:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
    --sans:system-ui,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    --num:"D-DIN","DIN Alternate","Bahnschrift",system-ui,sans-serif;
  }
  html,body{height:100%; margin:0;}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    overflow-x:hidden; -webkit-tap-highlight-color:transparent;
    touch-action:manipulation; user-select:none; -webkit-user-select:none;
  }
  /* 紙幣風の彩紋(うっすら) */
  body::before{content:""; position:fixed; inset:0; pointer-events:none; opacity:.05;
    background:
      radial-gradient(circle at 15% 20%, transparent 58px, var(--gold) 59px, transparent 61px),
      radial-gradient(circle at 85% 15%, transparent 88px, var(--gold) 89px, transparent 91px),
      radial-gradient(circle at 80% 85%, transparent 68px, var(--gold) 69px, transparent 71px),
      radial-gradient(circle at 10% 80%, transparent 98px, var(--gold) 99px, transparent 101px);}

  #app{max-width:560px; margin:0 auto; padding:14px 16px 40px; display:flex; flex-direction:column; gap:14px; position:relative;}

  /* ---------- header ---------- */
  header{display:flex; justify-content:space-between; align-items:center;}
  .brand{font-family:var(--min); font-size:15px; letter-spacing:.34em; color:var(--gold);}
  .brand small{display:block; font-family:var(--sans); font-size:8.5px; letter-spacing:.28em; color:var(--mut); margin-top:2px;}
  .hbtns{display:flex; gap:8px;}
  .hbtns button{background:none; border:1px solid var(--line); color:var(--sec); font-size:10px;
    letter-spacing:.12em; padding:5px 10px; border-radius:3px; cursor:pointer; font-family:var(--sans);}
  .hbtns button:hover{border-color:var(--golddim); color:var(--gold);}
  .hbtns button:focus-visible{outline:2px solid var(--gold);}

  /* ---------- rank ---------- */
  #rank{display:flex; align-items:center; gap:10px; justify-content:center;}
  #rankName{font-family:var(--min); font-size:17px; letter-spacing:.3em; text-indent:.3em; color:var(--ink);}
  .rank-rule{flex:1; max-width:70px; height:1px; background:linear-gradient(90deg, transparent, var(--golddim));}
  .rank-rule.r{background:linear-gradient(270deg, transparent, var(--golddim));}

  /* ---------- money counter (主役) ---------- */
  #counterWrap{text-align:center; padding:6px 0 2px;}
  #money{
    font-family:var(--num); font-weight:600; line-height:1;
    font-size:clamp(44px, 13vw, 74px); color:var(--goldb);
    font-variant-numeric:tabular-nums; letter-spacing:.01em;
    text-shadow:0 0 26px rgba(232,193,88,.25), 0 2px 0 rgba(0,0,0,.4);
    transition:transform .08s;
  }
  #money .unit{font-family:var(--min); font-size:.52em; margin:0 .04em; color:var(--gold);}
  #money .yen{font-family:var(--min); font-size:.4em; color:var(--sec); margin-left:.08em;}
  #money.pulse{transform:scale(1.045);}
  #sub{margin-top:8px; font-size:12.5px; color:var(--sec); font-variant-numeric:tabular-nums;}
  #sub b{color:var(--gold); font-weight:600; font-family:var(--num);}

  /* ---------- tap button ---------- */
  #tapZone{display:flex; justify-content:center; padding:8px 0 2px;}
  #tapBtn{
    width:min(62vw,240px); aspect-ratio:1; border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #23402e, #14241A 68%);
    border:2px solid var(--golddim); position:relative; cursor:pointer;
    box-shadow:0 8px 30px rgba(0,0,0,.5), inset 0 0 40px rgba(232,193,88,.08);
    transition:transform .06s;
    display:flex; align-items:center; justify-content:center;
  }
  #tapBtn:active{transform:scale(.96);}
  #tapBtn:focus-visible{outline:3px solid var(--gold); outline-offset:4px;}
  #tapBtn .koban{
    width:58%; aspect-ratio:1; border-radius:50%;
    background:radial-gradient(circle at 38% 30%, var(--goldb), var(--gold) 55%, #9a7c2e);
    border:3px solid #7a621f;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,.45), inset 0 -6px 14px rgba(0,0,0,.25), inset 0 5px 10px rgba(255,255,255,.35);
  }
  #tapBtn .koban span{font-family:var(--min); font-size:44px; color:#5c4a15; font-weight:700; text-shadow:0 1px 0 rgba(255,255,255,.35);}
  #tapHint{text-align:center; font-size:10.5px; letter-spacing:.2em; color:var(--mut); margin-top:8px;}

  /* ---------- shop ---------- */
  #shopTitle{font-family:var(--min); font-size:13px; letter-spacing:.4em; color:var(--gold);
    text-align:center; margin-top:4px;}
  #shop{display:flex; flex-direction:column; gap:9px;}
  .item{
    display:flex; align-items:center; gap:12px;
    background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:11px 13px; cursor:pointer; transition:border-color .15s, opacity .2s;
  }
  .item:hover{border-color:var(--golddim);}
  .item:focus-visible{outline:2px solid var(--gold);}
  .item.locked{opacity:.45; cursor:default;}
  .item .chip{
    flex:0 0 44px; height:44px; border-radius:50%;
    border:1.5px solid var(--golddim);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--min); font-size:21px; color:var(--gold);
    background:radial-gradient(circle at 35% 30%, rgba(232,193,88,.14), transparent 70%);
  }
  .item .info{flex:1; min-width:0;}
  .item .name{font-size:13.5px; font-weight:600; letter-spacing:.04em;}
  .item .name .lv{font-family:var(--num); font-size:11px; color:var(--gold); margin-left:7px;}
  .item .gain{font-size:11px; color:var(--sec); margin-top:3px; font-variant-numeric:tabular-nums;}
  .item .cost{
    text-align:right; font-family:var(--num); font-weight:600; font-size:15px;
    color:var(--goldb); font-variant-numeric:tabular-nums; white-space:nowrap;
  }
  .item .cost small{display:block; font-family:var(--sans); font-weight:400; font-size:9px;
    letter-spacing:.14em; color:var(--mut); margin-top:2px;}
  .item.cant .cost{color:var(--mut);}
  .item.bought{animation:bought .35s;}
  @keyframes bought{0%{background:#2a4433; border-color:var(--gold);} 100%{background:var(--panel);}}

  /* ---------- pops & particles ---------- */
  #fx{position:fixed; inset:0; pointer-events:none; z-index:50;}
  .pop{
    position:fixed; pointer-events:none; z-index:51;
    font-family:var(--num); font-weight:600; color:var(--goldb);
    text-shadow:0 1px 3px rgba(0,0,0,.6); font-variant-numeric:tabular-nums;
    animation:popup 0.9s ease-out forwards;
  }
  @keyframes popup{
    0%{opacity:0; transform:translate(-50%,0) scale(.6);}
    12%{opacity:1; transform:translate(-50%,-14px) scale(1.05);}
    100%{opacity:0; transform:translate(-50%,-72px) scale(1);}
  }

  /* ---------- milestone stamp ---------- */
  #stampWrap{position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    z-index:60; pointer-events:none;}
  #stampWrap.show{display:flex;}
  #stamp{
    width:min(74vw,320px); aspect-ratio:1; border-radius:50%;
    border:6px double var(--hanko); color:var(--hanko);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    background:rgba(13,26,18,.88); backdrop-filter:blur(3px);
    transform:rotate(-8deg);
    animation:stampIn .5s cubic-bezier(.2,2.2,.5,1) forwards;
  }
  #stamp .iwai{font-family:var(--min); font-size:30px; letter-spacing:.5em; text-indent:.5em;}
  #stamp .amt{font-family:var(--min); font-size:42px; font-weight:700; letter-spacing:.08em;}
  #stamp .newrank{font-size:12px; color:var(--gold); letter-spacing:.24em;}
  @keyframes stampIn{
    0%{opacity:0; transform:rotate(-8deg) scale(2.4);}
    60%{opacity:1; transform:rotate(-8deg) scale(.94);}
    100%{opacity:1; transform:rotate(-8deg) scale(1);}
  }
  #stampWrap.hide #stamp{animation:stampOut .4s forwards;}
  @keyframes stampOut{to{opacity:0; transform:rotate(-8deg) scale(1.1) translateY(-20px);}}

  /* ---------- offline modal ---------- */
  #welcome{position:fixed; inset:0; z-index:70; display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.6);}
  #welcome.show{display:flex;}
  #welcome .card{
    background:var(--panel); border:1px solid var(--golddim); border-radius:8px;
    padding:26px 30px; text-align:center; max-width:320px; margin:0 20px;
  }
  #welcome h2{font-family:var(--min); font-size:16px; letter-spacing:.3em; color:var(--gold); margin:0 0 12px;}
  #welcome p{font-size:13px; color:var(--sec); margin:0 0 6px;}
  #welcome .amt{font-family:var(--num); font-weight:600; font-size:30px; color:var(--goldb); margin:8px 0 16px;}
  #welcome button{
    background:var(--gold); color:#3a2f10; border:none; border-radius:4px;
    font-weight:700; font-size:14px; padding:11px 34px; cursor:pointer; letter-spacing:.1em;
  }

  #shake{display:contents;}
  @keyframes shake{
    0%,100%{transform:translate(0,0)} 25%{transform:translate(2px,-2px)}
    50%{transform:translate(-2px,1px)} 75%{transform:translate(1px,2px)}
  }
  body.shake #app{animation:shake .18s linear 2;}
  @media (prefers-reduced-motion:reduce){
    body.shake #app{animation:none;}
    #money{transition:none;}
    .pop{animation-duration:.5s;}
  }
  footer{text-align:center; font-size:9.5px; color:var(--mut); letter-spacing:.14em; margin-top:10px;}
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="brand">億り人<small>OKURIBITO · 兆への道</small></div>
    <div class="hbtns">
      <button id="sndBtn" aria-pressed="true">音 ON</button>
      <button id="resetBtn">初期化</button>
    </div>
  </header>

  <div id="rank">
    <div class="rank-rule"></div>
    <div id="rankName">小銭拾い</div>
    <div class="rank-rule r"></div>
  </div>

  <div id="counterWrap">
    <div id="money" aria-live="off">0<span class="yen">円</span></div>
    <div id="sub">毎秒 <b id="ips">¥0</b> · タップ <b id="cv">¥100</b></div>
  </div>

  <div id="tapZone">
    <button id="tapBtn" aria-label="タップして稼ぐ">
      <div class="koban"><span>両</span></div>
    </button>
  </div>
  <div id="tapHint">タップで稼ぐ</div>

  <div id="shopTitle">投 資</div>
  <div id="shop"></div>

  <footer>肩書きを上げて、兆を目指せ。進行は自動保存されます。</footer>
</div>

<canvas id="fx"></canvas>

<div id="stampWrap" aria-live="polite">
  <div id="stamp">
    <div class="iwai">祝</div>
    <div class="amt" id="stampAmt">一億円</div>
    <div class="newrank" id="stampRank"></div>
  </div>
</div>

<div id="welcome">
  <div class="card">
    <h2>おかえりなさい</h2>
    <p>留守中も投資が働いていました</p>
    <div class="amt" id="offlineAmt">+¥0</div>
    <button id="welcomeBtn">受け取る</button>
  </div>
</div>

<script>
"use strict";
/* ================================================================
   億り人 OKURIBITO — お金が貯まる高揚感プロトタイプ
   ================================================================ */
const $=s=>document.querySelector(s);
const TAU=Math.PI*2;

/* ---------------- 数値フォーマット(万・億・兆・京) ---------------- */
const UNITS=[[1e16,"京"],[1e12,"兆"],[1e8,"億"],[1e4,"万"]];
function trim0(s){ return s.includes(".")?s.replace(/\.?0+$/,""):s; }
function fmt(n){
  n=Math.floor(n);
  for(const[u,k]of UNITS){
    if(n>=u){
      const v=n/u;
      return trim0(v>=100?v.toFixed(0):v>=10?v.toFixed(1):v.toFixed(2))+k;
    }
  }
  return n.toLocaleString("ja-JP");
}
function fmtYen(n){ return "¥"+fmt(n); }
function moneyHTML(n){
  n=Math.floor(n);
  for(const[u,k]of UNITS){
    if(n>=u){
      const v=n/u;
      const s=trim0(v>=100?v.toFixed(0):v>=10?v.toFixed(1):v.toFixed(2));
      return s+'<span class="unit">'+k+'</span><span class="yen">円</span>';
    }
  }
  return n.toLocaleString("ja-JP")+'<span class="yen">円</span>';
}

/* ---------------- ゲームデータ ---------------- */
const TIERS=[
  {key:"click", chip:"手", name:"腕を磨く",           base:200,    growth:2.0,  click:100, gain:0},
  {key:"vend",  chip:"販", name:"自販機",             base:500,    growth:1.16, gain:10},
  {key:"yatai", chip:"麺", name:"深夜のラーメン屋台", base:4e3,    growth:1.16, gain:70},
  {key:"conv",  chip:"商", name:"コンビニFC",         base:3e4,    growth:1.17, gain:500},
  {key:"chain", chip:"店", name:"全国チェーン展開",   base:2.2e5,  growth:1.17, gain:3800},
  {key:"it",    chip:"創", name:"ITスタートアップ",   base:1.6e6,  growth:1.18, gain:28e3},
  {key:"tower", chip:"家", name:"タワマン一棟買い",   base:1.2e7,  growth:1.18, gain:2.1e5},
  {key:"space", chip:"宙", name:"宇宙ベンチャー",     base:9e7,    growth:1.19, gain:1.6e6},
  {key:"mint",  chip:"幣", name:"造幣局と縁を結ぶ",   base:6.8e8,  growth:1.20, gain:1.2e7},
];
const RANKS=[
  [0,"小銭拾い"],[1e4,"バイト戦士"],[1e5,"節約家"],[1e6,"貯金の鬼"],
  [1e7,"成金"],[1e8,"億り人"],[1e9,"大富豪"],[1e10,"財閥総帥"],
  [1e11,"経済の怪物"],[1e12,"兆の支配者"],[1e16,"京を見た者"],
];
const STAMP_KANJI={1e4:"一万円",1e5:"十万円",1e6:"百万円",1e7:"一千万円",
  1e8:"一億円",1e9:"十億円",1e10:"百億円",1e11:"千億円",1e12:"一兆円",1e16:"一京円"};

const S={money:0, total:0, lv:TIERS.map(()=>0), hit:{}, snd:true, last:Date.now()};

/* ---------------- セーブ/ロード ---------------- */
const KEY="okuribito-save-v1";
function save(){ S.last=Date.now(); try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){} }
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(KEY));
    if(!d) return;
    Object.assign(S,d);
    if(!Array.isArray(S.lv)||S.lv.length!==TIERS.length) S.lv=TIERS.map(()=>0);
    // オフライン収益(最大8時間)
    const dt=Math.min((Date.now()-(d.last||Date.now()))/1000, 8*3600);
    const gain=Math.floor(ips()*dt);
    if(gain>=100){
      S.money+=gain; S.total+=gain;
      $("#offlineAmt").textContent="+"+fmtYen(gain);
      $("#welcome").classList.add("show");
    }
  }catch(e){}
}

/* ---------------- 計算 ---------------- */
function cost(i){ return Math.floor(TIERS[i].base*Math.pow(TIERS[i].growth,S.lv[i])); }
function ips(){ return TIERS.reduce((a,t,i)=>a+(t.gain||0)*S.lv[i],0); }
function clickValAt(lv){ return Math.floor(100*(1+lv)*Math.pow(1.09,lv)); }
function clickVal(){ return clickValAt(S.lv[0]); }
function rank(){ let r=RANKS[0][1]; for(const[m,n]of RANKS) if(S.total>=m) r=n; return r; }

/* ---------------- サウンド(WebAudio生成) ---------------- */
let AC=null;
function ac(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state==="suspended")AC.resume(); return AC; }
function coinSfx(){
  if(!S.snd||!ac())return;
  const t=AC.currentTime;
  for(const[f,d,dl] of [[2093,.07,0],[2637,.09,.02]]){
    const o=AC.createOscillator(),g=AC.createGain();
    o.type="triangle"; o.frequency.value=f;
    o.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(0,t+dl); g.gain.linearRampToValueAtTime(.14,t+dl+.008);
    g.gain.exponentialRampToValueAtTime(.0001,t+dl+d);
    o.start(t+dl); o.stop(t+dl+d+.05);
  }
}
function buySfx(){
  if(!S.snd||!ac())return;
  const t=AC.currentTime;
  [[784,0],[1046,.07],[1568,.14]].forEach(([f,dl])=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type="square"; o.frequency.value=f;
    o.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(0,t+dl); g.gain.linearRampToValueAtTime(.07,t+dl+.01);
    g.gain.exponentialRampToValueAtTime(.0001,t+dl+.12);
    o.start(t+dl); o.stop(t+dl+.2);
  });
}
function fanfare(){
  if(!S.snd||!ac())return;
  const t=AC.currentTime;
  [[523,0],[659,.1],[784,.2],[1046,.3],[1318,.42],[1568,.54]].forEach(([f,dl])=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type="triangle"; o.frequency.value=f;
    o.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(0,t+dl); g.gain.linearRampToValueAtTime(.16,t+dl+.02);
    g.gain.exponentialRampToValueAtTime(.0001,t+dl+.5);
    o.start(t+dl); o.stop(t+dl+.6);
  });
}

/* ---------------- パーティクル ---------------- */
const fx=$("#fx"); const fg=fx.getContext("2d");
let P=[]; const RM=matchMedia("(prefers-reduced-motion: reduce)").matches;
function fitFx(){ fx.width=innerWidth*devicePixelRatio; fx.height=innerHeight*devicePixelRatio;
  fx.style.width=innerWidth+"px"; fx.style.height=innerHeight+"px";
  fg.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
addEventListener("resize",fitFx); fitFx();
function coins(x,y,n){
  if(RM)return;
  for(let i=0;i<n;i++)
    P.push({t:"c",x,y,vx:(Math.random()-.5)*260,vy:-180-Math.random()*240,
      r:4+Math.random()*4, rot:Math.random()*TAU, vr:(Math.random()-.5)*10, life:1});
}
function billRain(){
  if(RM)return;
  for(let i=0;i<46;i++)
    P.push({t:"b",x:Math.random()*innerWidth,y:-30-Math.random()*innerHeight*.6,
      vx:(Math.random()-.5)*40, vy:120+Math.random()*130,
      rot:Math.random()*TAU, vr:(Math.random()-.5)*4, life:4});
}
let lastFx=performance.now();
function fxLoop(now){
  const dt=Math.min(.05,(now-lastFx)/1000); lastFx=now;
  fg.clearRect(0,0,innerWidth,innerHeight);
  P=P.filter(p=>p.life>0 && p.y<innerHeight+60);
  for(const p of P){
    p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.rot+=p.vr*dt;
    if(p.t==="c"){ p.vy+=900*dt;
      fg.save(); fg.translate(p.x,p.y); fg.rotate(p.rot);
      fg.globalAlpha=Math.min(1,p.life*2.5);
      fg.fillStyle="#E8C158"; fg.beginPath(); fg.ellipse(0,0,p.r,p.r*.8,0,0,TAU); fg.fill();
      fg.strokeStyle="#7a621f"; fg.lineWidth=1.2; fg.stroke();
      fg.restore();
    } else { p.vx+=Math.sin(now/300+p.rot)*8*dt;
      fg.save(); fg.translate(p.x,p.y); fg.rotate(p.rot);
      fg.globalAlpha=Math.min(1,p.life);
      fg.fillStyle="#3f6b4a"; fg.fillRect(-13,-7,26,14);
      fg.strokeStyle="#E8C158"; fg.lineWidth=1; fg.strokeRect(-13,-7,26,14);
      fg.beginPath(); fg.arc(0,0,3.4,0,TAU); fg.stroke();
      fg.restore();
    }
  }
  requestAnimationFrame(fxLoop);
}
requestAnimationFrame(fxLoop);

function pop(x,y,text,size){
  const d=document.createElement("div");
  d.className="pop"; d.textContent=text;
  d.style.left=x+"px"; d.style.top=y+"px"; d.style.fontSize=(size||16)+"px";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),950);
}

/* ---------------- 演出: 節目スタンプ ---------------- */
let stampQueue=[]; let stamping=false;
function checkMilestones(){
  for(const m of Object.keys(STAMP_KANJI)){
    const v=Number(m);
    if(S.total>=v && !S.hit[m]){ S.hit[m]=1; stampQueue.push(v); }
  }
  if(stampQueue.length>1) stampQueue=[Math.max(...stampQueue)];  // 連発時は最高額だけ祝う
  if(!stamping && stampQueue.length) showStamp(stampQueue.shift());
}
function showStamp(v){
  stamping=true;
  $("#stampAmt").textContent=STAMP_KANJI[v];
  $("#stampRank").textContent="肩書き: "+rank();
  const w=$("#stampWrap");
  w.classList.remove("hide"); w.classList.add("show");
  fanfare(); billRain();
  if(!RM){ document.body.classList.add("shake"); setTimeout(()=>document.body.classList.remove("shake"),400); }
  setTimeout(()=>{ w.classList.add("hide");
    setTimeout(()=>{ w.classList.remove("show","hide"); stamping=false;
      if(stampQueue.length) showStamp(stampQueue.shift());
    },420);
  },2100);
}

/* ---------------- ショップ ---------------- */
const shopEl=$("#shop");
function buildShop(){
  shopEl.innerHTML="";
  TIERS.forEach((t,i)=>{
    const d=document.createElement("button");
    d.className="item"; d.id="item"+i;
    d.innerHTML=`
      <div class="chip">${t.chip}</div>
      <div class="info">
        <div class="name">${t.name}<span class="lv" id="lv${i}"></span></div>
        <div class="gain" id="gain${i}"></div>
      </div>
      <div class="cost"><span id="cost${i}"></span><small>購入</small></div>`;
    d.addEventListener("click",e=>buy(i,e));
    shopEl.appendChild(d);
  });
}
function buy(i,e){
  const c=cost(i);
  if(S.money<c){ return; }
  S.money-=c; S.lv[i]++;
  buySfx();
  const el=$("#item"+i);
  el.classList.remove("bought"); void el.offsetWidth; el.classList.add("bought");
  const r=el.getBoundingClientRect();
  coins(r.left+34, r.top+r.height/2, 14);
  renderShop(); renderTop(); save();
}
function renderShop(){
  TIERS.forEach((t,i)=>{
    const c=cost(i);
    $("#lv"+i).textContent=S.lv[i]?("Lv."+S.lv[i]):"";
    $("#gain"+i).textContent = t.key==="click"
      ? `タップ ${fmtYen(clickVal())}/回 → 次Lv ${fmtYen(clickValAt(S.lv[i]+1))}/回`
      : (S.lv[i]?`+${fmtYen(t.gain*S.lv[i])}/秒 → 次Lv +${fmtYen(t.gain)}/秒`:`+${fmtYen(t.gain)}/秒`);
    $("#cost"+i).textContent=fmtYen(c);
    const el=$("#item"+i);
    el.classList.toggle("cant", S.money<c);
    // 前段が未購入なら少し隠す(先の楽しみ)
    el.classList.toggle("locked", i>1 && S.lv[i-1]===0 && S.lv[i]===0);
  });
}

/* ---------------- タップ ---------------- */
$("#tapBtn").addEventListener("pointerdown",e=>{
  const v=clickVal();
  S.money+=v; S.total+=v;
  coinSfx();
  coins(e.clientX||innerWidth/2, e.clientY||innerHeight/2, 6);
  pop(e.clientX||innerWidth/2, (e.clientY||innerHeight/2)-30, "+"+fmtYen(v), 15+Math.min(10,String(v).length));
  const m=$("#money");
  m.classList.remove("pulse"); void m.offsetWidth; m.classList.add("pulse");
  renderTop(); checkMilestones();
});

/* ---------------- 表示更新 ---------------- */
function renderTop(){
  $("#money").innerHTML=moneyHTML(S.money);
  $("#ips").textContent=fmtYen(ips())+"/秒";
  $("#cv").textContent=fmtYen(clickVal());
  $("#rankName").textContent=rank();
}

/* ---------------- ループ ---------------- */
setInterval(()=>{
  const g=ips()/10;
  if(g>0){ S.money+=g; S.total+=g; }
},100);
setInterval(()=>{ renderTop(); renderShop(); checkMilestones(); },250);
setInterval(save,5000);
addEventListener("beforeunload",save);

/* ---------------- ボタン ---------------- */
$("#sndBtn").addEventListener("click",()=>{
  S.snd=!S.snd;
  $("#sndBtn").textContent=S.snd?"音 ON":"音 OFF";
  $("#sndBtn").setAttribute("aria-pressed",S.snd);
  save();
});
$("#resetBtn").addEventListener("click",()=>{
  if(confirm("最初からやり直しますか?(全データ削除)")){
    localStorage.removeItem(KEY); location.reload();
  }
});
$("#welcomeBtn").addEventListener("click",()=>{
  $("#welcome").classList.remove("show");
  coins(innerWidth/2, innerHeight/2, 24); coinSfx();
});

/* ---------------- 起動 ---------------- */
load();
buildShop();
renderTop(); renderShop();
$("#sndBtn").textContent=S.snd?"音 ON":"音 OFF";
</script>

</body>
</html>
